<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetBase — Your Pet's Digital Home</title>
    <meta name="description" content="PetBase helps you manage your pets' health records, share emergency pet cards, and connect with local pet owners — all with privacy-first encryption." />
    <meta name="theme-color" content="#059669" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to Firebase -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://storage.googleapis.com" />
    <link rel="dns-prefetch" href="https://www.googleapis.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PetBase — Your Pet's Digital Home" />
    <meta property="og:description" content="Manage pet health records, share emergency cards, and connect with local pet owners." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PetBase" />
    <meta name="twitter:description" content="Your pet's digital home — health records, sharing, and community." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
