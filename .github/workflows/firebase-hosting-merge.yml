# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Hosting ──────────────────────────────────────────────────────────
      - run: npm --prefix app install && npm --prefix app run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PETBASE_DDFD7 }}
          channelId: live
          projectId: petbase-ddfd7

      # ── Functions ─────────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PETBASE_DDFD7 }}'

      - name: Build and deploy Cloud Functions
        run: |
          npm --prefix functions install
          npm --prefix functions run build
          npx firebase-tools deploy --only functions --project petbase-ddfd7
